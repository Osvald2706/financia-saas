services:
  - type: web
    name: financia-saas
    runtime: node
    region: oregon
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: JWT_SECRET
        value: financia-prod-secret-key-2026
